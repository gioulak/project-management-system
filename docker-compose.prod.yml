version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - pms-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  user-service:
    build:
      context: ./nodejs/nodejs-microservices/services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: always
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pms-network

  team-service:
    build:
      context: ./nodejs/nodejs-microservices/services/team-service
      dockerfile: Dockerfile
    container_name: team-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - PORT=8081
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/pms_teams?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_URL=http://user-service:8080
    depends_on:
      mongodb:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - pms-network

  task-service:
    build:
      context: ./nodejs/nodejs-microservices/services/task-service
      dockerfile: Dockerfile
    container_name: task-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=production
      - PORT=8082
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/pms_tasks?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_URL=http://user-service:8080
      - TEAM_SERVICE_URL=http://team-service:8081
    depends_on:
      mongodb:
        condition: service_healthy
      user-service:
        condition: service_started
      team-service:
        condition: service_started
    networks:
      - pms-network

  frontend:
    build:
      context: ./nodejs/nodejs-microservices/client
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NEXT_PUBLIC_TEAM_API_URL=${NEXT_PUBLIC_TEAM_API_URL}
        - NEXT_PUBLIC_TASK_API_URL=${NEXT_PUBLIC_TASK_API_URL}
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_TEAM_API_URL=${NEXT_PUBLIC_TEAM_API_URL}
      - NEXT_PUBLIC_TASK_API_URL=${NEXT_PUBLIC_TASK_API_URL}
    depends_on:
      - user-service
      - team-service
      - task-service
    networks:
      - pms-network

networks:
  pms-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  mongodb_data:
    driver: local
